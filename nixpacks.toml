# Monorepo-style Nixpacks config: the Laravel + Inertia app lives in
# ferie-laravel/. Railway reads this file from the repo root and cd's
# into the subfolder for install, build and start.

[phases.setup]
nixPkgs = [
  "php82",
  "php82Packages.composer",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Extensions.bcmath",
  "php82Extensions.ctype",
  "php82Extensions.fileinfo",
  "php82Extensions.tokenizer",
  "php82Extensions.openssl",
  "nodejs_20",
]

[phases.install]
cmds = [
  # --no-scripts skips the post-autoload-dump hook that runs
  # `php artisan package:discover`. That hook boots Laravel and parses
  # APP_URL; if the env isn't fully set yet (first deploy), Laravel
  # throws "Invalid URI: Host is malformed". Package discovery will run
  # at startup instead, when the service env is complete.
  "cd ferie-laravel && composer install --no-dev --optimize-autoloader --no-scripts --no-interaction",
  # --include=dev forces Vite / React / Tailwind (in devDependencies) to
  # install even when Railway injects NODE_ENV=production.
  "cd ferie-laravel && npm ci --include=dev",
]

[phases.build]
cmds = [
  "cd ferie-laravel && npm run build",
]

# Config/route/view caches moved to the start command — they also boot
# Laravel and need a valid env. At start time the service env is fully
# populated so they run safely.
[start]
cmd = "cd ferie-laravel && php artisan package:discover --ansi && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"
